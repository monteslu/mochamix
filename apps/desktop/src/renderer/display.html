<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dj-app visualizer</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        color: #cdd6e6;
        font-family: 'Inter', system-ui, sans-serif;
        overflow: hidden;
      }
      #scope {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #meta {
        position: fixed;
        left: 24px;
        bottom: 24px;
        font-size: 22px;
        text-shadow: 0 2px 8px #000;
        pointer-events: none;
      }
      #meta .title {
        font-weight: 800;
        font-size: 30px;
      }
      #meta .sub {
        opacity: 0.7;
        font-size: 16px;
        margin-top: 4px;
      }
      #status {
        position: fixed;
        top: 12px;
        right: 16px;
        font-size: 12px;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <canvas id="scope"></canvas>
    <div id="meta"></div>
    <div id="status">waiting for data…</div>
    <script type="module" src="./display.ts"></script>
  </body>
</html>
